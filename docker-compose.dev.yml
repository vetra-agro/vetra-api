version: "3.9"

services:
  api:
    build:
      context: .
      target: builder
    container_name: vetra-api-dev
    command: npm run start:dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env
    environment:
      NODE_ENV: development
    restart: unless-stopped
